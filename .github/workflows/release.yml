name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install GTK3 build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev

      - name: Build
        run: |
          VERSION="${GITHUB_REF_NAME}"
          CGO_ENABLED=1 go build -ldflags="-s -w -X main.Version=${VERSION}" \
            -o github-notifier_linux_amd64 .

      - uses: actions/upload-artifact@v4
        with:
          name: github-notifier_linux_amd64
          path: github-notifier_linux_amd64

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
