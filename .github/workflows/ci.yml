name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install GTK3 build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev

      - name: Test
        run: go test ./internal/... -count=1 -race

      - name: Build
        run: go build -ldflags="-s -w" -o github-notifier .

      - name: Shellcheck install.sh
        run: shellcheck install.sh
